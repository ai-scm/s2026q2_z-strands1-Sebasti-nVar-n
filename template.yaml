AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Strands Travel Agent Lambda Function

Globals:
  Function:
    Timeout: 300
    MemorySize: 512
    Runtime: python3.13

Resources:
  StrandsTravelAgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: lambda_function.handler
      Environment:
        Variables:
          SESSIONS_TABLE: !Ref SessionsTable
          KNOWLEDGE_BASE_ID: "6YR5MXOS2P"  
      Policies:
        - AmazonBedrockFullAccess
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - S3ReadPolicy:
            BucketName: "*"

  SessionsTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      TableName: agent-sessions
      PrimaryKey:
        Name: sessionID
        Type: String

Outputs:
  StrandsTravelAgentFunction:
    Description: "Strands Travel Agent Lambda Function ARN"
    Value: !GetAtt StrandsTravelAgentFunction.Arn
